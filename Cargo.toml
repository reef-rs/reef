[workspace]
resolver = "2"
members = [
    "crates/cargo-reef",
    "crates/reef",
    "crates/reef-macros",
]

[workspace.package]
version = "0.2.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/reef-rs/cargo-reef"
homepage = "https://reef.rs"
authors = ["Matt Drulia"]

[workspace.dependencies]
# Workspace-internal crates — kept in lockstep
reef-macros = { version = "0.2.0", path = "crates/reef-macros" }

# Shared external deps
anyhow = "1"
serde = { version = "1", features = ["derive"] }
syn = { version = "2", features = ["full", "extra-traits"] }
quote = "1"
proc-macro2 = "1"
